  {id:221,n:"Girls Trip",a:"YES",cat:"Typography",fid:"1oX7UDMi9M83_0fTnnZNnXCVEHYSXcuaE",p:"Fun tropical: bold hot pink ink, palm trees, cocktail glass, tropical drink con whipped cream. Sparkles y starfish. Beach party vibe.",st:"Feminine",su:"",pt:"B"},
  {id:222,n:"Shipwreck",a:"YES",cat:"Typography",fid:"1Yi6nvpHNf9Rllg1rZPo_o9khlMeNGsEH",p:"Vintage distressed navy blue: rugged bearded sea captain con pipe y captain hat. Detailed sketch linework, ornate nautical flourishes.",st:"",su:"",pt:"B"},
  {id:223,n:"Skull Cherries",a:"YES",cat:"Gothic",fid:"1JIAIxNT9kwCqmkejy_2CdhbG36wg-v4e",p:"Dos glossy red skulls fusionados con cherry stems. Cracked surfaces. Large satin bow en black-to-charcoal gradient. Small bats volando.",st:"",su:"",pt:"B"},
  {id:224,n:"X Makes Me Say Bad Words",a:"YES",cat:"Typography",fid:"1DUcCt5_vvh_Ad8GBorHGmwFA093PGj4A",p:"Retro square layout: texto en burnt orange/beige/cream. Crossed golf clubs con dimpled golf ball. 4 horizontal retro sunset stripes.",st:"Groovy",su:"Sports",pt:"B"},
  {id:225,n:"Postal Stamps Grid",a:"YES",cat:"Floral",fid:"1rxPV8cfX6kMcc0WZ_HSjwYU3-7118cVf",p:"Pastel grid 3x2 de whimsical postage stamps, cada uno con diferente escena magica. Soft kawaii, washed vintage texture.",st:"",su:"",pt:"B"},
  {id:226,n:"Cute Pattern + Bow",a:"YES",cat:"Typography",fid:"1ceGoeWvOazI1Z-i6zldG7olJfm-rDRio",p:"Soft pastel stitched applique: [DESIGN_WORD_1] en large puffy letters, cada una con unique fabric pattern. Light blue bow debajo.",st:"",su:"",pt:"B"},
  {id:227,n:"F-Caw-F",a:"YES",cat:"Typography",fid:"1cFJ7aE19t5R78hvwJC2etIdRxxiCuxgO",p:"Bold: black crow on branch, blooming yellow daisies y leafy foliage. Distressed black checkerboard backdrop. Grungy hand-drawn all-caps.",st:"",su:"",pt:"B"}
];

const votes={};
const edits={};
let cur=0,filter='pending';

function imgUrl(fid){return 'https://drive.google.com/thumbnail?id='+fid+'&sz=w500';}
function getList(){
  if(filter==='all') return P;
  if(filter==='pending') return P.filter(p=>!votes[p.id]);
  if(filter==='ok') return P.filter(p=>votes[p.id]==='ok');
  if(filter==='bad') return P.filter(p=>votes[p.id]==='bad');
  if(filter==='skip') return P.filter(p=>votes[p.id]==='skip');
  return P;
}
function counts(){
  const ok=Object.values(votes).filter(v=>v==='ok').length;
  const bad=Object.values(votes).filter(v=>v==='bad').length;
  const sk=Object.values(votes).filter(v=>v==='skip').length;
  return{ok,bad,sk,pending:P.length-ok-bad-sk,total:P.length};
}
function saveEdit(field,val){
  const L=getList();const p=L[cur];if(!p)return;
  if(!edits[p.id])edits[p.id]={};
  edits[p.id][field]=val;
}
function vote(v){
  const L=getList();const p=L[cur];if(!p)return;
  if(edits[p.id]){
    if(edits[p.id].st!==undefined)p.st=edits[p.id].st;
    if(edits[p.id].su!==undefined)p.su=edits[p.id].su;
    if(edits[p.id].pt!==undefined)p.pt=edits[p.id].pt;
  }
  votes[p.id]=v;
  const nL=getList();
  if(cur>=nL.length)cur=Math.max(0,nL.length-1);
  render();
}
function setFilter(f){filter=f;cur=0;render();}
function mkOpts(arr,val){return arr.map(v=>'<option value="'+v+'"'+(v===val?' selected':'')+'>'+( v||'— ninguno')+'</option>').join('');}
function exportResults(){
  const bad=P.filter(p=>votes[p.id]==='bad');
  const lines=bad.map(p=>'ID '+p.id+' | '+p.n+' ('+p.a+')\nhttps://drive.google.com/file/d/'+p.fid+'/view').join('\n\n');
  const blob=new Blob(['No coinciden ('+bad.length+'):\n\n'+lines],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='no_coinciden.txt';a.click();
}
function render(){
  const c=counts();
  const L=getList();
  const done=c.ok+c.bad+c.sk;
  const pct=Math.round((done/c.total)*100);
  document.getElementById('prog').textContent=done+'/'+c.total+' revisados · '+pct+'%';
  document.getElementById('stats').innerHTML=
    '<span class="stat ok">✓ '+c.ok+'</span>'+
    '<span class="stat bad">✗ '+c.bad+'</span>'+
    '<span class="stat sk">→ '+c.sk+'</span>'+
    '<span class="stat">'+c.pending+' pendientes</span>';
  document.getElementById('fbar').innerHTML=
    '<button class="fb '+(filter==='pending'?'on':'')+'" onclick="setFilter(\'pending\')">Pendientes ('+c.pending+')</button>'+
    '<button class="fb '+(filter==='all'?'on':'')+'" onclick="setFilter(\'all\')">Todos</button>'+
    '<button class="fb '+(filter==='bad'?'on':'')+'" onclick="setFilter(\'bad\')">No coinciden ('+c.bad+')</button>'+
    '<button class="fb '+(filter==='ok'?'on':'')+'" onclick="setFilter(\'ok\')">OK ('+c.ok+')</button>'+
    (done>0?'<button class="exp" onclick="exportResults()">↓ Exportar</button>':'');
  if(L.length===0){document.getElementById('main').innerHTML='<div class="empty">Sin prompts en este filtro.</div>';return;}
  if(cur>=L.length)cur=0;
  const p=L[cur];
  const e=edits[p.id]||{};
  const st=e.st!==undefined?e.st:p.st;
  const su=e.su!==undefined?e.su:p.su;
  const pt=e.pt!==undefined?e.pt:p.pt;
  const ptOpts=['','D','L','B','D+L','D+B','L+B','D+L+B'].map(v=>'<option value="'+v+'"'+(pt===v?' selected':'')+'>'+( v||'—')+'</option>').join('');
  document.getElementById('main').innerHTML=`
<div class="card">
  <div class="chdr">
    <div>
      <div class="pname">ID ${p.id} — ${p.n}</div>
      <div class="meta">
        <span class="bdg ${p.a==='YES'?'yes':'no'}">${p.a==='YES'?'ACTIVE':'INACTIVE'}</span>
        <span class="bdg">${p.cat}</span>
      </div>
    </div>
    <div style="font-size:12px;color:#555;">${cur+1} / ${L.length}</div>
  </div>
  <div class="grid">
    <div>
      <div class="lbl">Imagen de referencia</div>
      <div class="ibox" id="ib">
        <img src="${imgUrl(p.fid)}" alt="Prompt ${p.id}"
          onload="document.getElementById('ib').style.minHeight='auto'"
          onerror="document.getElementById('ib').innerHTML='<div class=\\'noimg\\'>No cargo<br><a href=\\'https://drive.google.com/file/d/${p.fid}/view\\' target=\\'_blank\\'>Abrir en Drive</a></div>'" />
      </div>
    </div>
    <div>
      <div class="lbl">Prompt</div>
      <div class="ptext">${p.p}</div>
    </div>
  </div>
  <div class="fields">
    <div class="field">
      <label>Style</label>
      <select onchange="saveEdit('st',this.value)">${mkOpts(STYLES,st)}</select>
    </div>
    <div class="field">
      <label>Subject</label>
      <select onchange="saveEdit('su',this.value)">${mkOpts(SUBJECTS,su)}</select>
    </div>
    <div class="field">
      <label>Printing type</label>
      <select onchange="saveEdit('pt',this.value)">${ptOpts}</select>
    </div>
  </div>
  <div class="acts">
    <button class="btn ok" onclick="vote('ok')">✓ Coincide</button>
    <button class="btn bad" onclick="vote('bad')">✗ No coincide</button>
    <button class="btn sk" onclick="vote('skip')">→ Skip</button>
  </div>
  <div class="nav">
    <button class="btn" onclick="if(cur>0){cur--;render();}" ${cur===0?'disabled':''} style="flex:0.4;font-size:12px;">← Anterior</button>
    <button class="btn" onclick="if(cur<getList().length-1){cur++;render();}" ${cur===L.length-1?'disabled':''} style="flex:0.4;font-size:12px;">Siguiente →</button>
  </div>
</div>`;
}
render();
</script>
</body>
</html>
