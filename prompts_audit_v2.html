const votes={};
const edits={};
let cur=0,filter='pending';

function imgUrl(fid){return 'https://drive.google.com/thumbnail?id='+fid+'&sz=w500';}
function getList(){
  if(filter==='pending') return P.filter(p=>!votes[p.id]);
  if(filter==='done') return P.filter(p=>votes[p.id]==='ok');
  if(filter==='skip') return P.filter(p=>votes[p.id]==='skip');
  return P;
}
function counts(){
  const ok=Object.values(votes).filter(v=>v==='ok').length;
  const sk=Object.values(votes).filter(v=>v==='skip').length;
  return{ok,sk,pending:P.length-ok-sk,total:P.length};
}
function saveEdit(field,val){
  const L=getList();const p=L[cur];if(!p)return;
  if(!edits[p.id])edits[p.id]={};
  edits[p.id][field]=val;
}
function vote(v){
  const L=getList();const p=L[cur];if(!p)return;
  if(edits[p.id]){
    if(edits[p.id].st!==undefined)p.st=edits[p.id].st;
    if(edits[p.id].su!==undefined)p.su=edits[p.id].su;
    if(edits[p.id].pt!==undefined)p.pt=edits[p.id].pt;
  }
  votes[p.id]=v;
  const nL=getList();
  if(cur>=nL.length)cur=Math.max(0,nL.length-1);
  render();
}
function setFilter(f){filter=f;cur=0;render();}
function mkOpts(arr,val){return arr.map(v=>'<option value="'+v+'"'+(v===val?' selected':'')+'>'+( v||'— ninguno')+'</option>').join('');}
function exportCSV(){
  const rows=[['PROMPT_ID','STYLE_NAME','STYLE','SUBJECT','PRINTING_TYPE']];
  P.forEach(p=>rows.push([p.id,p.n,p.st,p.su,p.pt]));
  const csv=rows.map(r=>r.map(v=>'"'+(v||'')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='prompts_audit_v2.csv';a.click();
}
function render(){
  const c=counts();
  const L=getList();
  const done=c.ok+c.sk;
  const pct=Math.round((done/c.total)*100);
  document.getElementById('prog').textContent=done+'/'+c.total+' revisados · '+pct+'%';
  document.getElementById('stats').innerHTML=
    '<span class="stat ok">✓ '+c.ok+'</span>'+
    '<span class="stat sk">→ '+c.sk+'</span>'+
    '<span class="stat">'+c.pending+' pendientes</span>';
  document.getElementById('fbar').innerHTML=
    '<button class="fb '+(filter==='pending'?'on':'')+'" onclick="setFilter(\'pending\')">Pendientes ('+c.pending+')</button>'+
    '<button class="fb '+(filter==='all'?'on':'')+'" onclick="setFilter(\'all\')">Todos</button>'+
    '<button class="fb '+(filter==='done'?'on':'')+'" onclick="setFilter(\'done\')">Listos ('+c.ok+')</button>'+
    (done>0?'<button class="exp" onclick="exportCSV()">↓ Exportar CSV</button>':'');
  if(L.length===0){document.getElementById('main').innerHTML='<div class="empty">Sin prompts en este filtro.</div>';return;}
  if(cur>=L.length)cur=0;
  const p=L[cur];
  const e=edits[p.id]||{};
  const st=e.st!==undefined?e.st:p.st;
  const su=e.su!==undefined?e.su:p.su;
  const pt=e.pt!==undefined?e.pt:p.pt;
  const ptOpts=['','D','L','B','D+L','D+B','L+B','D+L+B'].map(v=>'<option value="'+v+'"'+(pt===v?' selected':'')+'>'+( v||'—')+'</option>').join('');
  document.getElementById('main').innerHTML=`
<div class="card">
  <div class="chdr">
    <div>
      <div class="pname">ID ${p.id} — ${p.n}</div>
      <div class="meta">
        <span class="bdg ${p.a==='YES'?'yes':'no'}">${p.a==='YES'?'ACTIVE':'INACTIVE'}</span>
        <span class="bdg">${p.cat}</span>
      </div>
    </div>
    <div style="font-size:12px;color:#555;">${cur+1} / ${L.length}</div>
  </div>
  <div class="grid">
    <div>
      <div class="lbl">Imagen de referencia</div>
      <div class="ibox" id="ib">
        <img src="${imgUrl(p.fid)}" alt="Prompt ${p.id}"
          onload="document.getElementById('ib').style.minHeight='auto'"
          onerror="document.getElementById('ib').innerHTML='<div class=\\'noimg\\'>No cargo<br><a href=\\'https://drive.google.com/file/d/${p.fid}/view\\' target=\\'_blank\\'>Abrir en Drive</a></div>'" />
      </div>
    </div>
    <div>
      <div class="lbl">Prompt</div>
      <div class="ptext">${p.p}</div>
    </div>
  </div>
  <div class="fields">
    <div class="field">
      <label>Style</label>
      <select onchange="saveEdit('st',this.value)">${mkOpts(STYLES,st)}</select>
    </div>
    <div class="field">
      <label>Subject</label>
      <select onchange="saveEdit('su',this.value)">${mkOpts(SUBJECTS,su)}</select>
    </div>
    <div class="field">
      <label>Printing type</label>
      <select onchange="saveEdit('pt',this.value)">${ptOpts}</select>
    </div>
  </div>
  <div class="acts">
    <button class="btn ok" onclick="vote('ok')">✓ Listo</button>
    <button class="btn sk" onclick="vote('skip')">→ Skip</button>
  </div>
  <div class="nav">
    <button class="btn" onclick="if(cur>0){cur--;render();}" ${cur===0?'disabled':''} style="flex:0.4;font-size:12px;">← Anterior</button>
    <button class="btn" onclick="if(cur<getList().length-1){cur++;render();}" ${cur===L.length-1?'disabled':''} style="flex:0.4;font-size:12px;">Siguiente →</button>
  </div>
</div>`;
}
render();
</script>
